name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version (Semantic)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bumped: ${{ steps.check-bump.outputs.bumped }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bump version script
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OUTPUT=$(python scripts/bump_version.py)
          echo "$OUTPUT"
          
          NEW_VERSION=$(echo "$OUTPUT" | grep "^NEW_VERSION=" | cut -d'=' -f2)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push tag
        id: check-bump
        run: |
          NEW_VER="${{ steps.bump.outputs.new_version }}"
          if ! git diff --quiet pyproject.toml; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            git add pyproject.toml
            git commit -m "chore(release): bump version to v$NEW_VER [skip ci]"
            git push origin main
            
            git tag "v$NEW_VER"
            git push origin "v$NEW_VER"
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create GitHub release
    needs: bump-version
    if: |
      always() &&
      (
        (needs.bump-version.result == 'success' && needs.bump-version.outputs.bumped == 'true') ||
        (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.determine-tag.outputs.tag_name }}
    steps:
      - name: Determine tag name
        id: determine-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="v${{ needs.bump-version.outputs.new_version }}"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.determine-tag.outputs.tag_name }}
        run: |
          if [ "$TAG_NAME" = "latest" ]; then
            gh release delete "$TAG_NAME" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          fi
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "yt-vd $TAG_NAME" \
            --notes "Release of yt-vd $TAG_NAME built from commit $GITHUB_SHA" \
            --latest || true

  build:
    name: Build ${{ matrix.name }}
    needs: [bump-version, create-release]
    if: |
      always() &&
      (
        (needs.bump-version.result == 'success' && needs.bump-version.outputs.bumped == 'true') ||
        (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            cli_asset: yt-vd-windows.exe
            cli_dest: dist/yt-vd.exe
          - name: linux
            os: ubuntu-latest
            cli_asset: yt-vd-linux
            cli_dest: dist/yt-vd
          - name: macos
            os: macos-latest
            cli_asset: yt-vd-macos
            cli_dest: dist/yt-vd

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . "pyinstaller>=6.11.0"

      - name: Build executables
        run: |
          python -m PyInstaller yt-vd.spec --clean --noconfirm

      - name: Rename and Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        run: |
          mv "${{ matrix.cli_dest }}" "dist/${{ matrix.cli_asset }}"
          gh release upload "$TAG_NAME" \
            "dist/${{ matrix.cli_asset }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
