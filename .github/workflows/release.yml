name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.determine-tag.outputs.tag_name }}
    steps:
      - name: Determine tag name
        id: determine-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="latest"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.determine-tag.outputs.tag_name }}
        run: |
          if [ "$TAG_NAME" = "latest" ]; then
            gh release delete "$TAG_NAME" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          fi
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "yt-vd $TAG_NAME" \
            --notes "Automated release of yt-vd ($TAG_NAME) built from commit $GITHUB_SHA" \
            --latest

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            cli_asset: yt-vd.exe
          - name: linux
            os: ubuntu-latest
            cli_asset: yt-vd

    steps:
      - name: Checkout source
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi

          "$PYTHON" --version
          "$PYTHON" -m pip install --upgrade pip
          "$PYTHON" -m pip install . "pyinstaller>=6.11.0"

      - name: Build executables
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi

          "$PYTHON" -m PyInstaller yt-vd.spec --clean --noconfirm

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" \
            "dist/${{ matrix.cli_asset }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
